server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: aimap-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # KingbaseES（PostgreSQL 兼容协议），统一使用 PostgreSQL JDBC / 方言以减少迁移改动
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:54321}/${DB_NAME:test}?currentSchema=public&stringtype=unspecified
    username: ${DB_USER:system}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

ark:
  api-key: ${ARK_API_KEY:}
  base-url: ${ARK_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
  model: ${ARK_MODEL:doubao-seed-2-0-lite-260428}

# 文档正文：Tika 抽取上限（防止超大文档撑爆内存）；送入大模型前再按 llm-body-max-chars 截断
aimap:
  document:
    tika-write-limit: 500000
    llm-body-max-chars: 80000
    storage-root: ${DOCUMENT_STORAGE_ROOT:./data/document-originals}
