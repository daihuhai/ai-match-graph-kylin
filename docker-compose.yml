# 本地开发用 openGauss（国产数据库，PostgreSQL 兼容协议）。
# 启动：docker compose up -d
# 默认映射主机端口 5432；首次启动后执行 scripts/ensure-dev-db.ps1 会尝试创建 aimap 库与应用账号。
services:
  aimap-db:
    image: enmotech/opengauss:3.0.0
    container_name: aimap-opengauss-dev
    privileged: true
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      GS_PASSWORD: AimapDev1!
      GS_NODENAME: opengauss
    volumes:
      - opengauss-data:/var/lib/opengauss
    healthcheck:
      test: ["CMD-SHELL", "su - omm -c 'export GAUSSHOME=/usr/local/opengauss PATH=/usr/local/opengauss/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin LD_LIBRARY_PATH=/usr/local/opengauss/lib; gsql -d postgres -p 5432 -c \"SELECT 1;\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s

volumes:
  opengauss-data:
